name: Fetch Player Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch player data
        env:
          RIOT_API_KEY: ${{ secrets.RIOTAPI }}
        run: node scripts/fetch-players.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json
          git diff --staged --quiet || git commit -m "chore: update player data"
          git push
